name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/drawdash-signing"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/drawdash-signing/release.jks"
      - name: Test and build signed artifacts
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/drawdash-signing/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew testDebugUnitTest lintDebug assembleRelease bundleRelease
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk "release/DrawDash-${VERSION}-release.apk"
          cp app/build/outputs/bundle/release/app-release.aab "release/DrawDash-${VERSION}-release.aab"
          sha256sum release/* > "release/DrawDash-${VERSION}-SHA256SUMS.txt"
      - name: Remove signing material
        if: always()
        run: rm -rf "$RUNNER_TEMP/drawdash-signing"
      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes/${{ github.ref_name }}.md
          files: |
            release/DrawDash-${{ github.ref_name }}-release.apk
            release/DrawDash-${{ github.ref_name }}-release.aab
            release/DrawDash-${{ github.ref_name }}-SHA256SUMS.txt
